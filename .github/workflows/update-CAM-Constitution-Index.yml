name: Update Constitution Index

on:
  push:
    branches: [ main ]
    paths:
      - ".github/scripts/lib/**"
      - ".github/scripts/update-CAM-Constitution-Index.py"
      - ".github/scripts/lib/instrument_parser.py"
      - "Governance/Constitution/**"
      - "!Governance/Constitution/CAM-Constitution-Index.md"
      - "!Governance/Constitution/constitution.index.json"
  workflow_run:
    workflows: ["Update Amendment Ledgers"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: governance-index-updates
  cancel-in-progress: false

jobs:
  build:
    if: |
      (github.event_name == 'push' && github.actor != 'github-actions[bot]') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    env:
      BOT_NAME: github-actions[bot]
      BOT_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate + commit + push Constitution index + JSON
        shell: bash
        run: |
          set -euo pipefail

          git checkout -B main origin/main
          git config --global user.name "${BOT_NAME}"
          git config --global user.email "${BOT_EMAIL}"

          python .github/scripts/update-CAM-Constitution-Index.py

          git add Governance/Constitution/CAM-Constitution-Index.md Governance/Constitution/constitution.index.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "[AUTO][Constitution] Refresh CAM Constitution index + JSON"

          git pull --rebase origin main
          git push origin HEAD:main
