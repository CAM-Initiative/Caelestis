name: Update Constitution Index

on:
  push:
    branches: [ main ]
    paths:
      - ".github/scripts/lib/**"
      - ".github/scripts/update-CAM-Constitution-Index.py"
      - ".github/scripts/lint_amendment_ledger.py"
      - ".github/scripts/hash-ledger.py"
      - ".github/scripts/lib/instrument_parser.py"
      - "Governance/Constitution/**"
      - "!Governance/Constitution/CAM-Constitution-Index.md"
      - "!Governance/Constitution/constitution.index.json"

permissions:
  contents: write

concurrency:
  group: governance-generated-writes-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      BOT_NAME: github-actions[bot]
      BOT_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: |
          echo "BASE_SHA=${{ github.event.before }}" >> "$GITHUB_ENV"
          echo "HEAD_SHA=${{ github.sha }}" >> "$GITHUB_ENV"
      - run: python .github/scripts/update-CAM-Constitution-Index.py
      - run: python .github/scripts/lint_amendment_ledger.py --base "${BASE_SHA}" --head "${HEAD_SHA}" --strict --stage downstream_block
      - run: python .github/scripts/hash-ledger.py --base "${BASE_SHA}" --head "${HEAD_SHA}"
      - run: |
          set -euo pipefail
          git checkout -B main origin/main
          git config --global user.name "${BOT_NAME}"
          git config --global user.email "${BOT_EMAIL}"
          git add Governance/Constitution/CAM-Constitution-Index.md Governance/Constitution/constitution.index.json Governance/Constitution/*.md
          if git diff --cached --quiet; then echo "No changes to commit."; exit 0; fi
          git commit -m "[AUTO][Constitution] Refresh index + ledger hashes"
          git pull --rebase origin main
          git push origin HEAD:main
