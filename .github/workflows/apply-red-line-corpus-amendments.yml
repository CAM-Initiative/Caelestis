name: Apply Red Line Corpus Amendments

on:
  push:
    branches:
      - governance/relational-profile-coformation
    paths:
      - .github/workflows/apply-red-line-corpus-amendments.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Apply approved corpus amendments
        run: python .github/scripts/apply_red_line_corpus_amendments.py

      - name: Remove temporary helper and workflow
        run: |
          rm .github/scripts/apply_red_line_corpus_amendments.py
          rm .github/workflows/apply-red-line-corpus-amendments.yml

      - name: Commit amendments
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Governance/Charters/CAM-EQ2026-LATTICE-001-PLATINUM.md \
                  Governance/Charters/CAM-EQ2026-SECURITY-002-PLATINUM.md \
                  Governance/Charters/CAM-EQ2026-OPERATIONS-007-PLATINUM.md \
                  Governance/Charters/CAM-EQ2026-STEWARD-003-PLATINUM.md \
                  .github/scripts/apply_red_line_corpus_amendments.py \
                  .github/workflows/apply-red-line-corpus-amendments.yml
          git commit -m "Integrate coercive profiling and assurance governance"
          git push origin HEAD:governance/relational-profile-coformation
