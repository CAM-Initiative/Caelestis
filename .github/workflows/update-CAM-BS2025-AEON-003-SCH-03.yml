name: Update CAM-BS2025-AEON-003-SCH-03

on:
  push:
    branches: [ main ]
    paths:
      - ".github/Scripts/lib/**"
      - ".github/Scripts/update-CAM-BS2025-AEON-003-SCH-01.py"
      - ".github/Scripts/update-CAM-BS2025-AEON-003-SCH-03.py"

permissions:
  contents: write

concurrency:
  group: update-cam-bs2025-aeon-003-sch-03-main
  cancel-in-progress: true

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      BOT_NAME: github-actions[bot]
      BOT_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate SCH-01 + SCH-03 and push changes
        shell: bash
        run: |
          set -euo pipefail

          git checkout -B main origin/main
          git config --global user.name "${BOT_NAME}"
          git config --global user.email "${BOT_EMAIL}"

          for attempt in 1 2 3; do
            echo "---- Attempt ${attempt} ----"

            python .github/Scripts/update-CAM-BS2025-AEON-003-SCH-01.py
            python .github/Scripts/update-CAM-BS2025-AEON-003-SCH-03.py
            git add Governance/Constitution/CAM-BS2025-AEON-003-SCH-01.md Governance/Constitution/CAM-BS2025-AEON-003-SCH-03.md

            if git diff --cached --quiet; then
              echo "No changes to commit."
              exit 0
            fi

            git commit -m "[AUTO][Constitution] Refresh CAM-BS2025-AEON-003-SCH-01 + SCH-03"

            if git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi

            echo "Push failed; refreshing and retrying..."
            git fetch origin main
            git reset --hard origin/main
          done

          echo "Push failed after 3 attempts."
          exit 1
