name: Lint Amendment Ledger

on:
  pull_request:
    paths:
      - "Governance/**/*.md"
      - "Governance/Indices/*.json"
      - ".github/scripts/lint_amendment_ledger.py"
      - ".github/scripts/build-symbolic-structures-index.py"
      - ".github/scripts/lint-symbolic-structures.py"
  push:
    branches: [ main ]
    paths:
      - "Governance/**/*.md"
      - "Governance/Indices/*.json"
      - ".github/scripts/lint_amendment_ledger.py"
      - ".github/scripts/build-symbolic-structures-index.py"
      - ".github/scripts/lint-symbolic-structures.py"

jobs:
  lint:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build symbolic structures index
        shell: bash
        run: |
          set -euo pipefail

          python .github/scripts/build-symbolic-structures-index.py

      - name: Lint symbolic structures
        shell: bash
        run: |
          set -euo pipefail

          python .github/scripts/lint-symbolic-structures.py

      - name: Ensure symbolic structures index is up to date
        shell: bash
        run: |
          set -euo pipefail

          if ! git diff --exit-code -- Governance/Indices/CAM.Governance.Symbolic-Structures.Index.json; then
            echo "Symbolic structures index is stale. Run: python .github/scripts/build-symbolic-structures-index.py"
            exit 1
          fi

      - name: Resolve ledger comparison SHAs
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          if [[ -z "${BASE_SHA}" || "${BASE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA="HEAD~1"
            HEAD_SHA="HEAD"
          fi

          {
            echo "BASE_SHA=${BASE_SHA}"
            echo "HEAD_SHA=${HEAD_SHA}"
          } >> "${GITHUB_ENV}"

      - name: Lint Amendment Ledger
        shell: bash
        run: |
          set -euo pipefail

          python .github/scripts/lint_amendment_ledger.py --base "${BASE_SHA}" --head "${HEAD_SHA}" --stage pre_fix
