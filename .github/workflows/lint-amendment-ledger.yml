name: Lint Amendment Ledger

on:
  pull_request:
    paths:
      - "Governance/Constitution/**/*.md"
      - "Governance/Charters/**/*.md"
      - ".github/scripts/lint_amendment_ledger.py"
  push:
    branches: [ main ]
    paths:
      - "Governance/Constitution/**/*.md"
      - "Governance/Charters/**/*.md"
      - ".github/scripts/lint_amendment_ledger.py"

jobs:
  lint:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve ledger comparison SHAs
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          if [[ -z "${BASE_SHA}" || "${BASE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA="HEAD~1"
            HEAD_SHA="HEAD"
          fi

          {
            echo "BASE_SHA=${BASE_SHA}"
            echo "HEAD_SHA=${HEAD_SHA}"
          } >> "${GITHUB_ENV}"

      - name: Fix Amendment Ledger (auto-hash)
        shell: bash
        run: |
          set -euo pipefail

          python .github/scripts/lint_amendment_ledger.py \
            --base "${BASE_SHA}" \
            --head "${HEAD_SHA}" \
            --fix

      - name: Commit ledger fixes
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail

          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "Auto-fix Amendment Ledger (hash update)"
            git push origin HEAD:main
          fi

      - name: Lint Amendment Ledger
        shell: bash
        run: |
          set -euo pipefail

          python .github/scripts/lint_amendment_ledger.py --base "${BASE_SHA}" --head "${HEAD_SHA}"
