name: Lint Amendment Ledger

on:
  pull_request:
    paths:
      - "Governance/**/*.md"
      - "Governance/Indices/*.json"
      - ".github/scripts/lint_amendment_ledger.py"
      - ".github/scripts/build-symbolic-structures-index.py"
      - ".github/scripts/lint-symbolic-structures.py"
      - ".github/workflows/lint-amendment-ledger.yml"
  push:
    branches: [ main ]
    paths:
      - "Governance/**/*.md"
      - "Governance/Indices/*.json"
      - ".github/scripts/lint_amendment_ledger.py"
      - ".github/scripts/build-symbolic-structures-index.py"
      - ".github/scripts/lint-symbolic-structures.py"
      - ".github/workflows/lint-amendment-ledger.yml"

env:
  STRICT_RELEASE: ${{ vars.STRICT_RELEASE || 'false' }}

jobs:
  lint:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: A. Structure / markdown / metadata checks
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile .github/scripts/lint_amendment_ledger.py .github/scripts/lint-symbolic-structures.py

      - name: Resolve ledger comparison SHAs
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          if [[ -z "${BASE_SHA}" || "${BASE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA="HEAD~1"
            HEAD_SHA="HEAD"
          fi

          {
            echo "BASE_SHA=${BASE_SHA}"
            echo "HEAD_SHA=${HEAD_SHA}"
          } >> "${GITHUB_ENV}"

      - name: B. Amendment ledger hash population / verification
        id: ledger
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/lint_amendment_ledger.py --base "${BASE_SHA}" --head "${HEAD_SHA}" --stage pre_fix

      - name: C1. Build symbolic structures index (staleness check)
        id: symbolic_build
        shell: bash
        run: |
          set +e
          python .github/scripts/build-symbolic-structures-index.py
          build_exit=$?
          stale_exit=0
          if ! git diff --exit-code -- Governance/Indices/CAM.Governance.Symbolic-Structures.Index.json Governance/Indices/CAM.Governance.Symbolic-Structures.Index.md; then
            echo "Symbolic structures index is stale. Run: python .github/scripts/build-symbolic-structures-index.py"
            stale_exit=1
          fi
          status=$(( build_exit != 0 ? build_exit : stale_exit ))
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: C2. Canonical-code registry lint
        id: symbolic_lint
        shell: bash
        run: |
          set +e
          if [[ "${STRICT_RELEASE}" == "true" ]]; then
            python .github/scripts/lint-symbolic-structures.py --strict-release --canonical-codes-enforcement error
            status=$?
          else
            python .github/scripts/lint-symbolic-structures.py --canonical-codes-enforcement warning
            status=$?
          fi
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: D. Final validation summary
        shell: bash
        run: |
          set -euo pipefail

          ledger_status=0
          symbolic_build_status='${{ steps.symbolic_build.outputs.status }}'
          symbolic_lint_status='${{ steps.symbolic_lint.outputs.status }}'

          echo "Validation Summary"
          echo "- ledger/hash failures: ${ledger_status}"
          echo "- metadata failures: handled via canonical-codes lint mode"
          echo "- symbolic registry warnings/errors status: ${symbolic_lint_status}"
          echo "- strict release blockers mode: ${STRICT_RELEASE}"

          if [[ "${STRICT_RELEASE}" == "true" ]]; then
            if [[ "${symbolic_build_status}" != "0" || "${symbolic_lint_status}" != "0" ]]; then
              echo "Strict release mode enabled: symbolic registry checks are blocking."
              exit 1
            fi
          fi
