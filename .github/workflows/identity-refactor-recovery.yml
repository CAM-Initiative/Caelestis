name: One-time IDENTITY refactor recovery merge

on:
  push:
    branches:
      - refactor/identity-domain-architecture
    paths:
      - .github/workflows/identity-refactor-recovery.yml

permissions:
  contents: write

jobs:
  recover-misplaced-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out working branch
        uses: actions/checkout@v4
        with:
          ref: refactor/identity-domain-architecture
          fetch-depth: 0

      - name: Merge misplaced commit without discarding branch history
        shell: bash
        run: |
          set -euo pipefail

          target_commit="45d13c63fa7346066e2391a35468232519f97294"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main refactor/identity-domain-architecture

          if git merge-base --is-ancestor "$target_commit" HEAD; then
            echo "Commit $target_commit is already present on the working branch."
            exit 0
          fi

          git merge --no-ff -X theirs "$target_commit" \
            -m "Merge misplaced IDENTITY refactor commit 45d13c6 into working branch"

          git push origin HEAD:refactor/identity-domain-architecture
