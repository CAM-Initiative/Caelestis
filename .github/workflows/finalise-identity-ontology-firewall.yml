name: Finalise identity ontology firewall

on:
  push:
    branches:
      - governance/relational-profile-coformation
    paths:
      - .github/scripts/finalise_identity_ontology_firewall.py
      - .github/workflows/finalise-identity-ontology-firewall.yml

permissions:
  contents: write

jobs:
  finalise:
    runs-on: ubuntu-latest
    steps:
      - name: Check out working branch
        uses: actions/checkout@v4
        with:
          ref: governance/relational-profile-coformation
          fetch-depth: 0

      - name: Correct ledger metadata
        run: python .github/scripts/finalise_identity_ontology_firewall.py

      - name: Remove temporary migration helpers
        run: |
          rm -f .github/scripts/apply_identity_ontology_firewall.py
          rm -f .github/workflows/apply-identity-ontology-firewall.yml
          rm -f .github/scripts/finalise_identity_ontology_firewall.py
          rm -f .github/workflows/finalise-identity-ontology-firewall.yml

      - name: Validate and commit final review state
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "finalise identity ontology firewall"
          git push origin HEAD:governance/relational-profile-coformation
