name: Update Law Index

on:
  push:
    branches: [ main ]
    paths:
      - ".github/scripts/lib/**"
      - ".github/scripts/update-CAM-Laws-Index.py"
      - ".github/scripts/lint_amendment_ledger.py"
      - ".github/scripts/hash-ledger.py"
      - "Governance/Laws/**"
      - "!Governance/Laws/CAM-Laws-Index.md"
      - "!Governance/Laws/laws.index.json"

permissions:
  contents: write

concurrency:
  group: governance-generated-writes-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      BOT_NAME: github-actions[bot]
      BOT_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip

      - name: Resolve ledger comparison SHAs
        run: |
          echo "BASE_SHA=${{ github.event.before }}" >> "$GITHUB_ENV"
          echo "HEAD_SHA=${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Run registry/state builders
        run: python .github/scripts/update-CAM-Laws-Index.py

      - name: Run validation/lint checks
        run: python .github/scripts/lint_amendment_ledger.py --base "${BASE_SHA}" --head "${HEAD_SHA}" --strict --stage downstream_block

      - name: Run ledger hash computation
        run: python .github/scripts/hash-ledger.py --base "${BASE_SHA}" --head "${HEAD_SHA}"

      - name: Stage + commit + push changes (if any)
        run: |
          set -euo pipefail
          git checkout -B main origin/main
          git config --global user.name "${BOT_NAME}"
          git config --global user.email "${BOT_EMAIL}"
          git add Governance/Laws/CAM-Laws-Index.md Governance/Laws/laws.index.json Governance/Laws/*.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "[AUTO][Laws] Refresh CAM Laws index + JSON + ledger hashes"
          git pull --rebase origin main
          git push origin HEAD:main
