name: One-time IDENTITY-003 stewardship migration

on:
  pull_request:
    branches:
      - refactor/identity-domain-architecture
    paths:
      - .github/identity-003-stewardship-migration-trigger

permissions:
  contents: write

jobs:
  migrate-machine-civil-identity:
    runs-on: ubuntu-latest
    steps:
      - name: Check out working branch
        uses: actions/checkout@v4
        with:
          ref: refactor/identity-domain-architecture
          fetch-depth: 0

      - name: Apply stewardship migration
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          sed -i 's/## 7.3 Directional Modulation/## 7.3 Execution Intent Threshold/' .github/scripts/identity_003_to_steward_005.py

          if ! python .github/scripts/identity_003_to_steward_005.py 2> /tmp/identity-003-migration-error.txt; then
            cp /tmp/identity-003-migration-error.txt .github/IDENTITY-003-MIGRATION-DIAGNOSTIC.txt
            git add .github/IDENTITY-003-MIGRATION-DIAGNOSTIC.txt
            git commit -m "Capture IDENTITY-003 migration diagnostic"
            git push origin HEAD:refactor/identity-domain-architecture
            exit 1
          fi

          rm -f .github/IDENTITY-003-MIGRATION-DIAGNOSTIC.txt
          git add -A
          git commit -m "Migrate machine civil identity governance to Stewardship"
          git push origin HEAD:refactor/identity-domain-architecture
