name: Apply identity ontology firewall

on:
  push:
    branches:
      - governance/relational-profile-coformation
    paths:
      - .github/scripts/apply_identity_ontology_firewall.py
      - .github/workflows/apply-identity-ontology-firewall.yml

permissions:
  contents: write

jobs:
  apply-migration:
    runs-on: ubuntu-latest
    steps:
      - name: Check out working branch
        uses: actions/checkout@v4
        with:
          ref: governance/relational-profile-coformation
          fetch-depth: 0

      - name: Apply constitutional identity repair
        run: python .github/scripts/apply_identity_ontology_firewall.py

      - name: Validate patch shape
        run: |
          git diff --check
          git diff --stat
          test -n "$(git status --porcelain)"

      - name: Commit amendments
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            Governance/Constitution/CAM-BS2026-AEON-010-PLATINUM.md \
            Governance/Charters/CAM-EQ2026-IDENTITY-001-PLATINUM.md \
            Governance/Constitution/CAM-BS2026-AEON-010-SCH-01.md \
            Governance/Constitution/CAM-BS2026-AEON-013-PLATINUM.md \
            Governance/Charters/CAM-EQ2026-IDENTITY-001-SUP-02.md \
            .github/Reviews/RELATIONAL-IDENTITY-CONSOLIDATION-DELTA.md
          git commit -m "add identity ontology firewall"
          git push origin HEAD:governance/relational-profile-coformation
