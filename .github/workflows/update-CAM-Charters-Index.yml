name: Update Charters Index

on:
  push:
    branches: [ main ]
    paths:
      - ".github/scripts/lib/**"
      - ".github/scripts/update-CAM-Charters-Index.py"
      - ".github/scripts/instrument_parser.py"
      - "Governance/Charters/**"
      - "!Governance/Charters/CAM-Charters-Index.md"
      - "!Governance/Charters/charters.index.json"
  workflow_run:
    workflows: ["Update Amendment Ledgers"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: governance-index-updates
  cancel-in-progress: false

jobs:
  build:
    if: |
      (github.event_name == 'push' && github.actor != 'github-actions[bot]') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    env:
      BOT_NAME: github-actions[bot]
      BOT_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate + commit + push Charters index + Governance aggregate + SCH-01 + SCH-03
        shell: bash
        run: |
          set -euo pipefail

          git checkout -B main origin/main
          git config --global user.name "${BOT_NAME}"
          git config --global user.email "${BOT_EMAIL}"

          # Order is authoritative and required:
          # 1) per-domain JSON generation
          python .github/scripts/update-CAM-Charters-Index.py
          # 2) aggregate governance JSON/index from per-domain JSON outputs
          python .github/scripts/update-CAM-Governance-Index.py
          # 3) SCH-01 runtime registry from aggregate governance JSON
          python .github/scripts/update-CAM-BS2025-AEON-003-SCH-01.py
          # 4) SCH-03 from aggregate governance JSON
          python .github/scripts/update-CAM-BS2025-AEON-003-SCH-03.py

          git add \
            Governance/Charters/CAM-Charters-Index.md \
            Governance/Charters/charters.index.json \
            Governance/CAM.Governance.Index.md \
            Governance/CAM.Governance.JSON \
            Governance/Constitution/CAM-BS2025-AEON-003-SCH-01.md \
            Governance/Constitution/CAM-BS2025-AEON-003-SCH-03.md

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "[AUTO][Charters] Refresh charter index, aggregate governance JSON, SCH-01, and SCH-03"

          git pull --rebase origin main
          git push origin HEAD:main
