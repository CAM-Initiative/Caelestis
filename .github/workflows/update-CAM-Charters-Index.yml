name: Update Charters Index
on:
  push:
    branches: [ main ]
    paths:
      - ".github/scripts/lib/**"
      - ".github/scripts/update-CAM-Charters-Index.py"
      - ".github/scripts/lint_amendment_ledger.py"
      - ".github/scripts/hash-ledger.py"
      - "Governance/Charters/**"
      - "!Governance/Charters/CAM-Charters-Index.md"
      - "!Governance/Charters/charters.index.json"
permissions:
  contents: write
concurrency:
  group: governance-generated-writes-${{ github.ref }}
  cancel-in-progress: false
jobs:
  build:
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: python -m pip install --upgrade pip
      - run: |
          echo "BASE_SHA=${{ github.event.before }}" >> "$GITHUB_ENV"
          echo "HEAD_SHA=${{ github.sha }}" >> "$GITHUB_ENV"
      - run: python .github/scripts/update-CAM-Charters-Index.py
      - run: python .github/scripts/lint_amendment_ledger.py --base "${BASE_SHA}" --head "${HEAD_SHA}" --strict --stage downstream_block
      - run: python .github/scripts/hash-ledger.py --base "${BASE_SHA}" --head "${HEAD_SHA}"
      - run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Governance/Charters/CAM-Charters-Index.md Governance/Charters/charters.index.json Governance/Charters/*.md
          if git diff --cached --quiet; then echo "No changes to commit."; exit 0; fi
          git commit -m "[AUTO][Charters] Refresh index + ledger hashes"
          git pull --rebase origin main
          git push origin HEAD:main
