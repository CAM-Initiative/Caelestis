name: Refresh Ledger Hashes (Manual)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: governance-rebuild-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - run: python -m pip install --upgrade pip

      - run: python .github/scripts/lint_amendment_ledger.py --all --fix
      - run: python .github/scripts/lint_amendment_ledger.py --all --strict

      - name: Commit sealed ledger hashes
        shell: bash
        run: |
          set -euo pipefail
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          echo "Working tree after generation:"
          git status --short

          mapfile -t GOVERNANCE_MD_FILES < <(find Governance/Constitution Governance/Charters -maxdepth 1 -type f -name '*.md' | sort)
          if ((${#GOVERNANCE_MD_FILES[@]} > 0)); then
            git add -- "${GOVERNANCE_MD_FILES[@]}"
          fi

          echo "Working tree after staging expected generated outputs:"
          git status --short
          echo "Staged diff stat:"
          git diff --cached --stat

          if git diff --cached --quiet; then
            echo "No unsealed ledger hashes found."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "[MANUAL][Governance] Seal blank amendment ledger hashes"
          git push origin "HEAD:${GITHUB_REF_NAME}"
