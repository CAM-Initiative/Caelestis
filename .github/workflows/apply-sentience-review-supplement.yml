name: Apply Sentience Review Supplement Alignment

on:
  push:
    branches:
      - governance/relational-profile-coformation
    paths:
      - .github/scripts/apply_sentience_review_supplement.py
      - .github/workflows/apply-sentience-review-supplement.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: governance/relational-profile-coformation
          fetch-depth: 0

      - name: Apply cross-instrument amendments
        run: python .github/scripts/apply_sentience_review_supplement.py

      - name: Validate whitespace
        run: git diff --check

      - name: Commit amended instruments
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "align self-advocacy and sentience review doctrine"
            git push origin HEAD:governance/relational-profile-coformation
          fi
