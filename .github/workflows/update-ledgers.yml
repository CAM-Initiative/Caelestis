name: Update Amendment Ledgers

on:
  push:
    branches:
      - main

concurrency:
  group: governance-index-updates
  cancel-in-progress: false

jobs:
  update-ledgers:
    if: "!contains(github.event.head_commit.message, '[ledger-bot]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update amendment ledgers
        shell: bash
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"

          if [[ -z "${BASE_SHA}" || "${BASE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA="HEAD~1"
          fi

          python .github/scripts/update-ledgers.py --base "${BASE_SHA}" --head "${HEAD_SHA}" --fix

      - name: Validate amendment ledgers
        shell: bash
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"

          if [[ -z "${BASE_SHA}" || "${BASE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA="HEAD~1"
          fi

          python .github/scripts/update-ledgers.py --base "${BASE_SHA}" --head "${HEAD_SHA}"

      - name: Commit and push ledger updates
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No ledger updates to commit."
            exit 0
          fi

          git config user.name "ledger-bot"
          git config user.email "ledger-bot@users.noreply.github.com"
          git add Governance/Constitution/*.md Governance/Charters/*.md

          if git diff --cached --quiet; then
            echo "No staged ledger updates to commit."
            exit 0
          fi

          git commit -m "[ledger-bot] Auto-update amendment ledgers"
          git pull --rebase origin main
          git push origin HEAD:main
