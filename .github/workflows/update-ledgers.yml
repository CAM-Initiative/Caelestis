name: Update Amendment Ledgers
on:
  push:
    branches: [ main ]
concurrency:
  group: governance-generated-writes-${{ github.ref }}
  cancel-in-progress: false
jobs:
  update-ledgers:
    if: "!contains(github.event.head_commit.message, '[ledger-bot]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: python -m pip install --upgrade pip
      - run: |
          echo "BASE_SHA=${{ github.event.before }}" >> "$GITHUB_ENV"
          echo "HEAD_SHA=${{ github.sha }}" >> "$GITHUB_ENV"
      - run: python .github/scripts/lint_amendment_ledger.py --base "${BASE_SHA}" --head "${HEAD_SHA}" --stage pre_fix
      - run: python .github/scripts/hash-ledger.py --base "${BASE_SHA}" --head "${HEAD_SHA}"
      - run: python .github/scripts/lint_amendment_ledger.py --base "${BASE_SHA}" --head "${HEAD_SHA}" --strict --stage post_fix
      - run: |
          set -euo pipefail
          if git diff --quiet; then echo "No ledger updates to commit."; exit 0; fi
          git config user.name "ledger-bot"
          git config user.email "ledger-bot@users.noreply.github.com"
          git add Governance/Constitution/*.md Governance/Charters/*.md
          if git diff --cached --quiet; then echo "No staged ledger updates to commit."; exit 0; fi
          git commit -m "[ledger-bot] Auto-update amendment ledgers"
          git pull --rebase origin main
          git push origin HEAD:main
