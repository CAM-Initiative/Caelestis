name: One-time IDENTITY consolidation migration

on:
  pull_request:
    branches:
      - refactor/identity-domain-architecture
    paths:
      - .github/identity-consolidation-trigger

permissions:
  contents: write

jobs:
  migrate-and-retire-redundant-profile-stack:
    runs-on: ubuntu-latest
    steps:
      - name: Check out working branch
        uses: actions/checkout@v4
        with:
          ref: refactor/identity-domain-architecture
          fetch-depth: 0

      - name: Apply deterministic consolidation migration
        shell: bash
        run: |
          set -uo pipefail
          report=.github/Reviews/IDENTITY-CONSOLIDATION-STAGE-A-ERROR.txt
          rm -f "$report"

          if ! python .github/scripts/identity_consolidation_stage_a.py > /tmp/identity-stage-a.log 2>&1; then
            cp /tmp/identity-stage-a.log "$report"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "$report"
            git commit -m "Record IDENTITY consolidation migration failure"
            git push origin HEAD:refactor/identity-domain-architecture
            cat /tmp/identity-stage-a.log
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Consolidate relational profile doctrine and retire duplicate stack"
          git push origin HEAD:refactor/identity-domain-architecture
