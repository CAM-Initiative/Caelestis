name: Update Governance Index

on:
  push:
    branches: [ main ]
    paths:
      - ".github/scripts/lib/**"
      - ".github/scripts/update-CAM-Governance-Index.py"
      - ".github/scripts/lint_amendment_ledger.py"
      - ".github/scripts/update-CAM-Constitution-Index.py"
      - ".github/scripts/update-CAM-BS2025-AEON-003-SCH-01.py"
      - ".github/scripts/update-CAM-BS2025-AEON-003-SCH-03.py"
      - ".github/scripts/build-symbolic-structures-index.py"
      - "Governance/Constitution/CAM-Constitution-Index.md"
      - "Governance/Constitution/constitution.index.json"
      - "Governance/Laws/CAM-Laws-Index.md"
      - "Governance/Laws/laws.index.json"
      - "Governance/Charters/CAM-Charters-Index.md"
      - "Governance/Charters/charters.index.json"
      - "Governance/Indices/CAM.Governance.Symbolic-Structures.Registry.json"

permissions:
  contents: write

concurrency:
  group: governance-generated-writes-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      BOT_NAME: github-actions[bot]
      BOT_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Block downstream updates if source ledgers are unsealed
        shell: bash
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"

          if [[ -z "${BASE_SHA}" || "${BASE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA="HEAD~1"
          fi

          python .github/scripts/lint_amendment_ledger.py --base "${BASE_SHA}" --head "${HEAD_SHA}" --strict --stage downstream_block

      - name: Generate + commit + push Governance + schedule + symbolic indexes
        shell: bash
        run: |
          set -euo pipefail

          git checkout -B main origin/main
          git config --global user.name "${BOT_NAME}"
          git config --global user.email "${BOT_EMAIL}"

          # 1) Aggregate governance JSON/index from per-domain JSON outputs
          python .github/scripts/update-CAM-Governance-Index.py
          # 2) SCH-01 runtime registry from aggregate governance JSON
          python .github/scripts/update-CAM-BS2025-AEON-003-SCH-01.py
          # 3) SCH-03 from aggregate governance JSON
          python .github/scripts/update-CAM-BS2025-AEON-003-SCH-03.py
          # 4) Rebuild Constitution index after schedule updates
          python .github/scripts/update-CAM-Constitution-Index.py
          # 5) Rebuild aggregate governance index after constitution refresh
          python .github/scripts/update-CAM-Governance-Index.py
          # 6) symbolic structures index from governance corpus
          python .github/scripts/build-symbolic-structures-index.py

          git add \
            Governance/CAM.Governance.Index.md \
            Governance/CAM.Governance.JSON \
            Governance/Constitution/CAM-Constitution-Index.md \
            Governance/Constitution/constitution.index.json \
            Governance/Constitution/CAM-BS2025-AEON-003-SCH-01.md \
            Governance/Constitution/CAM-BS2025-AEON-003-SCH-03.md \
            Governance/Indices/CAM.Governance.Symbolic-Structures.Index.json \
            Governance/Indices/CAM.Governance.Symbolic-Structures.Index.md

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "[AUTO][Governance] Refresh global indexes + schedules + symbolic index"

          git pull --rebase origin main
          git push origin HEAD:main
