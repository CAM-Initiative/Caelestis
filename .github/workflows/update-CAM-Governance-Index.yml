name: Update Governance Index
on:
  push:
    branches: [ main ]
permissions:
  contents: write
jobs:
  build:
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: python -m pip install --upgrade pip
      - run: |
          echo "BASE_SHA=${{ github.event.before }}" >> "$GITHUB_ENV"
          echo "HEAD_SHA=${{ github.sha }}" >> "$GITHUB_ENV"
      - name: Run registry/state builders
        run: |
          python .github/scripts/update-CAM-Governance-Index.py
          python .github/scripts/update-CAM-BS2025-AEON-003-SCH-01.py
          python .github/scripts/update-CAM-BS2025-AEON-003-SCH-03.py
          python .github/scripts/update-CAM-Constitution-Index.py
          python .github/scripts/update-CAM-Governance-Index.py
          python .github/scripts/build-symbolic-structures-index.py
      - name: Run validation/lint checks
        run: python .github/scripts/lint_amendment_ledger.py --base "${BASE_SHA}" --head "${HEAD_SHA}" --strict --stage downstream_block
      - name: Run ledger hash computation
        run: python .github/scripts/hash-ledger.py --base "${BASE_SHA}" --head "${HEAD_SHA}"
      - name: Commit if changed
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Governance/
          if git diff --cached --quiet; then echo "No changes to commit."; exit 0; fi
          git commit -m "[AUTO][Governance] Refresh indexes + schedules + ledger hashes"
          git pull --rebase origin main
          git push origin HEAD:main
