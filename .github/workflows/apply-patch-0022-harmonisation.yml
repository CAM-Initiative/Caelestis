name: Apply PATCH-0022 Corpus Harmonisation

on:
  push:
    branches:
      - governance/relational-profile-coformation
    paths:
      - .github/workflows/apply-patch-0022-harmonisation.yml

permissions:
  contents: write

jobs:
  harmonise:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout working branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Apply approved corpus amendments
        run: python .github/scripts/harmonise_patch_0022.py

      - name: Validate open amendment rows
        shell: bash
        run: |
          set -euo pipefail
          BASE_SHA="$(git rev-parse HEAD~1)"
          python .github/scripts/lint_amendment_ledger.py --base "${BASE_SHA}" --head HEAD --strict
          python .github/scripts/validate_canonical_headers.py
          mkdir -p validation-reports
          python .github/scripts/validate_markdown_section_refs.py --root Governance --report-file validation-reports/section-reference-report.tsv
          python .github/scripts/build-canonical-code-index.py --root Governance
          python .github/scripts/lint-symbolic-structures.py --index Governance/CAM.Canonical.Code.Index.json

      - name: Remove temporary helper files
        run: |
          rm .github/scripts/harmonise_patch_0022.py
          rm .github/workflows/apply-patch-0022-harmonisation.yml

      - name: Commit harmonised corpus
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Governance/ .github/Indices/ .github/scripts/harmonise_patch_0022.py .github/workflows/apply-patch-0022-harmonisation.yml
          git commit -m "Harmonise PATCH-0022 corpus amendments"
          git push origin HEAD:governance/relational-profile-coformation

# Triggered after workflow registration.
